<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Удалить транзакцию</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4 text-danger">❌ Удалить транзакцию</h1>

    <p class="lead">Вы уверены, что хотите удалить транзакцию от <strong>{{ transaction.date }}</strong> на сумму <strong>{{ transaction.amount }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'transaction_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
</body>
</html>
