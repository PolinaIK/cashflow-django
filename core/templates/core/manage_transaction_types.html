{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Управление типами транзакций</h2>
    <form method="post" class="mb-3">
        {% csrf_token %}
        <div class="row g-2">
            <div class="col-auto">
                <input type="text" name="name" class="form-control" placeholder="Новый тип">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-success">Добавить</button>
            </div>
        </div>
    </form>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Название</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for transaction_type in transaction_types %}
                <tr>
                    <td>{{ transaction_type.name }}</td>
                    <td>
                        <form method="post" action="{% url 'delete_transaction_type' transaction_type.id %}">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                        </form>
                    </td>
                </tr>
            {% empty %}
                <tr><td colspan="2">Нет добавленных типов.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
