{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Управление статусами</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Добавить статус</button>
    </form>

    <h4 class="mt-4">Существующие статусы</h4>
    <ul class="list-group">
        {% for status in statuses %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ status.name }}
                <form method="post" action="{% url 'delete_status' status.id %}" style="margin: 0;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                </form>
            </li>
        {% empty %}
            <li class="list-group-item">Статусов пока нет.</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
